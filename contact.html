<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>7TH | Замовлення</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
:root {
    --primary:#111;
    --accent:#c9a96e;
    --bg:#f1f1f1;
}

body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:var(--bg);
}

/* HEADER */
.header{
    background:#111;
    color:#fff;
    padding:20px;
    text-align:center;
    font-family:'Bebas Neue',sans-serif;
    letter-spacing:3px;
    font-size:32px;
}

/* NAV */
.nav{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:10px;
}
.nav a{
    color:#fff;
    text-decoration:none;
    font-weight:600;
}
.nav a:hover{
    color:var(--accent);
}

/* FORM */
.form-container{
    max-width:500px;
    margin:50px auto;
    background:#fff;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.form-container h2{
    text-align:center;
    margin-bottom:20px;
}

input, textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:15px;
}

input:focus, textarea:focus{
    outline:none;
    box-shadow:0 0 10px var(--accent);
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:50px;
    background:var(--accent);
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
}
button:hover{
    background:#111;
    color:#fff;
}

/* CART PREVIEW */
.cart-preview{
    background:#f9f9f9;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    font-size:14px;
}

/* TOAST */
#toast{
    position:fixed;
    bottom:20px;
    right:20px;
    background:var(--accent);
    padding:15px 25px;
    border-radius:50px;
    font-weight:700;
    display:none;
}

/* SIDEBAR */
.sidebar{
    position:fixed;
    top:0;
    left:-300px;
    width:250px;
    height:100%;
    background:#111;
    padding:30px 20px;
    transition:0.4s;
    z-index:999;
}
.sidebar a{
    display:block;
    color:#fff;
    text-decoration:none;
    margin:15px 0;
}

/* LOGO trigger */
.logo{
    position:fixed;
    top:20px;
    left:20px;
    cursor:pointer;
    z-index:1000;
    font-weight:700;
}
</style>
</head>
<body>

<div class="logo" id="logo">☰</div>

<div class="sidebar" id="sidebar">
    <a href="index.html">Головна</a>
    <a href="contact.html">Замовлення</a>
</div>

<div class="header">
    7TH
    <div class="nav">
        <a href="index.html">Головна</a>
        <a href="contact.html">Замовлення</a>
    </div>
</div>

<div class="form-container reveal">
    <h2>Оформити замовлення</h2>

    <!-- CART -->
    <div class="cart-preview" id="cartPreview">
        Завантаження товарів...
    </div>

    <form id="orderForm" action="https://formspree.io/f/yourformid" method="POST">
        <input type="text" name="name" placeholder="Ваше ім'я" required>
        <input type="email" name="email" placeholder="Email" required>
        <textarea name="message" id="message" placeholder="Ваше замовлення..." required></textarea>
        <button type="submit">Відправити замовлення</button>
    </form>
</div>

<div id="toast"></div>

<script src="js/form.js"></script>

<script>
// 🔥 CART PREVIEW
const cart = JSON.parse(localStorage.getItem('cart')) || [];
const cartPreview = document.getElementById('cartPreview');
const message = document.getElementById('message');

if(cart.length === 0){
    cartPreview.textContent = "Корзина пуста";
}else{
    let text = "Товари:\n";
    cart.forEach(item=>{
        text += `• ${item.name} (${item.price} грн)\n`;
    });

    cartPreview.textContent = text;
    message.value = text;
}

// 🔥 SIDEBAR
const logo = document.getElementById('logo');
const sidebar = document.getElementById('sidebar');

let timeout;

function openSidebar(){
    clearTimeout(timeout);
    sidebar.style.left = '0';
}
function closeSidebar(){
    timeout = setTimeout(()=>{ sidebar.style.left='-300px'; },200);
}

logo.addEventListener('mouseenter', openSidebar);
logo.addEventListener('mouseleave', closeSidebar);
sidebar.addEventListener('mouseenter', openSidebar);
sidebar.addEventListener('mouseleave', closeSidebar);

// 🔥 REVEAL
function reveal(){
    document.querySelectorAll('.reveal').forEach(el=>{
        const top = el.getBoundingClientRect().top;
        if(top < window.innerHeight - 100){
            el.classList.add('active');
        }
    });
}
window.addEventListener('scroll', reveal);
</script>

</body>
</html>
