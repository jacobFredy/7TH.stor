<style>
/* === ВСІ СТИЛІ ТВОЇ === */
:root {
    --primary:#111;
    --accent:#c9a96e;
    --bg:#f1f1f1;
    --text:#111;
}

/* --- BODY --- */
body{
    margin:0;
    padding:0;
    font-family:'Poppins',sans-serif;
    background:var(--bg);
    color:var(--text);
    scroll-behavior:smooth;
}

/* --- TOP BAR --- */
.top-bar{
    width:100%;
    background:var(--bg);
    padding:8px 40px;
    box-sizing:border-box;
}
.top-bar-links{
    display:flex;
    justify-content:flex-end;
    gap:20px;
    font-weight:600;
}
.top-bar a{
    text-decoration:none;
    color:var(--text);
    padding:6px 15px;
    border-radius:50px;
    font-size:14px;
    transition:0.3s;
}
.top-bar a:hover{
    color:#fff;
    background:var(--accent);
}

/* --- TOP MENU --- */
.top-menu-container{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0px 40px;
    position:sticky;
    top:0;
    z-index:99;
    background:#f1f1f1;
    border-bottom:1px solid #ddd;
}
.logo-in-menu{
    background:#f1f1f1;
    padding:20px 20px;
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    height:30px;
    box-sizing:border-box;
}
.logo-in-menu img{
    max-height:85px;
    display:block;
    object-fit:contain;
    margin-top:-30px;
    margin-left:-15px;
}
.logo-in-menu img:hover{
    transform:scale(1.05);
}
.top-menu{
    display:flex;
    gap:15px;
}
.top-menu a{
    position:relative;
    padding:6px 15px;
    font-weight:600;
    font-size:14px;
    text-decoration:none;
    border-radius:50px;
    background:#eee;
    color:#111;
    transition:0.4s;
    display:flex;
    align-items:center;
}
.top-menu a img{
    height:16px;
    margin-right:4px;
}
.top-menu a:hover{
    color:var(--accent);
}
.top-menu a::after{
    content:'';
    position:absolute;
    width:0;
    height:2px;
    bottom:0;
    left:50%;
    background:var(--accent);
    transition:0.4s;
    border-radius:2px;
}
.top-menu a:hover::after{
    width:100%;
    left:0;
}
.top-menu a.special{
    background:transparent;
    color:#111;
}
.top-menu a.special:hover{
    color:var(--accent);
}

/* --- SEARCH --- */
.search-container input{
    padding:8px 20px;
    border-radius:50px;
    border:1px solid #ccc;
    outline:none;
    transition:0.3s;
    font-size:14px;
    background:#fff;
    color:#111;
}
.search-container input:focus{
    box-shadow:0 0 10px var(--accent);
}

/* --- HERO --- */
.hero{
    position:relative;
    height:90vh;
    overflow:hidden;
}
.hero img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition: transform 1.5s ease, filter 1.5s ease;
}
.hero:hover img{
    transform:scale(1.05);
    filter: brightness(0.85);
}
.hero-text{
    position:absolute;
    bottom:80px;
    left:60px;
    color:#fff;
    text-shadow:0 3px 10px rgba(0,0,0,0.4);
}
.hero-text h1{
    font-family:'Bebas Neue', sans-serif;
    font-size:110px;
    letter-spacing:4px;
    margin:0;
}
.hero-text p{
    font-size:22px;
    letter-spacing:3px;
    margin-top:-10px;
    opacity:0.9;
}
.hero-text .btn{
    margin-top:20px;
    padding:14px 35px;
    background:var(--accent);
    color:#111;
    font-weight:700;
    border-radius:50px;
    text-decoration:none;
    display:inline-block;
    transition:0.4s;
    font-size:16px;
}
.hero-text .btn:hover{
    background:#fff;
    transform:translateY(-5px);
    color:var(--accent);
}

/* --- CATEGORIES --- */
.categories{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(350px,1fr));
    gap:30px;
    padding:50px 40px;
    background:#f9f9f9;
}
.category{
    position:relative;
    border-radius:20px;
    overflow:hidden;
    height:500px;
    cursor:pointer;
    transition:0.5s;
    display:flex;
    align-items:center;
    justify-content:center;
}
.category img{
    width:100%;
    height:100%;
    object-fit:contain;
    background:#fff;
    transition:0.5s;
}
.category:hover img{
    transform:scale(1.05);
    filter: brightness(0.9);
}
.category h3{
    position:absolute;
    bottom:20px;
    left:20px;
    color:#fff;
    font-size:26px;
    background:rgba(0,0,0,0.5);
    padding:10px 20px;
    border-radius:30px;
    font-weight:700;
    transition:0.3s;
}
.category:hover h3{
    background:var(--accent);
    color:#111;
}

/* --- PRODUCTS --- */
.products{
    padding:50px 40px;
    background:#fff;
}
.products h2{
    font-family:'Bebas Neue', sans-serif;
    font-size:42px;
    letter-spacing:2px;
}
.product-row{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:30px;
}

/* === Card Styles та анімації залишаємо === */
/* Повний твій CSS залишаю як є, включно з .card, .badge, .wishlist, .quick-add, arrows, shine, responsive, toast, sidebar, footer */
  /* --- Sidebar --- */
.sidebar{
    position: fixed;
    top:0;
    left: -300px; /* схований за екраном */
    width:250px;
    height:100%;
    background:#111; /* чорний фон сайдбару */
    padding:30px 20px;
    transition:0.4s;
    z-index:999;
    box-shadow: 2px 0 15px rgba(0,0,0,0.2);
}

.sidebar ul{
    list-style:none;
    padding:0;
    margin:0;
}

.sidebar ul li{
    margin:20px 0;
}

.sidebar ul li a{
    display:block;
    width:100%;
    padding:12px 20px;
    text-align:left;
    text-decoration:none;
    font-family:'Poppins', sans-serif;
    font-weight:700;
    font-size:16px;
    color:#fff;
    letter-spacing:0.5px;
    position:relative;
    border-radius:6px;
    transition:0.3s;
    background:transparent;
}

.sidebar ul li a::after{
    content:'';
    position:absolute;
    bottom:0;
    left:50%;
    width:0;
    height:2px;
    background:#fff;
    transition:0.3s;
    transform:translateX(-50%);
}

.sidebar ul li a:hover::after{
    width:100%;
    left:0;
}

.sidebar ul li a:hover{
    color:#fff;
    background:rgba(255,255,255,0.05);
}
</style>
